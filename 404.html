<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>404 — MusicPlatforme</title>
<script>
var p=location.pathname,known=['/explore','/wave','/radio','/charts','/new','/favorites','/playlists','/history','/subscriptions','/upload','/profile','/search'];
var isSPA=known.indexOf(p)!==-1||p.match(/^\/(track|artist|radio)\//);
if(isSPA){sessionStorage.setItem('spa_redirect',p+location.search+location.hash);location.replace('/')}
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#121212;--surface:#1e1e1e;--surface2:#2a2a2a;--text:#e0e0e0;--text2:#a0a0a0;--primary:#6750A4;--primary-light:#9a82db}
body{background:var(--bg);font-family:'Inter',system-ui,sans-serif;height:100vh;display:flex;align-items:center;justify-content:center;color:var(--text);overflow:hidden}
.wrap{text-align:center;padding:24px;max-width:500px;width:100%}
.code-404{font-size:clamp(80px,22vw,160px);font-weight:900;color:var(--text);letter-spacing:-4px;line-height:1;margin-bottom:12px;cursor:pointer;transition:color .3s;user-select:none;position:relative}
.code-404:hover{color:var(--primary-light)}
.code-404-hint{font:400 11px/1 'Inter',sans-serif;color:var(--text2);opacity:0;transition:opacity .3s;margin-top:4px}
.code-404:hover~.code-404-hint{opacity:1}
.typewriter{font-size:clamp(15px,3vw,22px);color:var(--text2);height:32px;display:flex;align-items:center;justify-content:center;margin-bottom:28px}
.tw-cursor{border-right:2px solid var(--primary);padding-right:3px;animation:blink .7s infinite}
.home-btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:var(--primary);color:#fff;border:none;border-radius:24px;font:600 15px/1 'Inter',sans-serif;cursor:pointer;text-decoration:none;transition:transform .2s,background .2s,box-shadow .2s;box-shadow:0 4px 16px rgba(103,80,164,.3)}
.home-btn:hover{transform:scale(1.04);background:var(--primary-light);box-shadow:0 6px 24px rgba(103,80,164,.4)}
.home-btn .material-symbols-rounded{font-size:20px}
.path-hint{margin-top:14px;font:400 12px/1.4 'Inter',sans-serif;color:var(--text2);opacity:.4;word-break:break-all}
@keyframes blink{0%,100%{border-color:var(--primary)}50%{border-color:transparent}}
/* === GAME === */
#gameWrap{display:none;position:fixed;inset:0;background:var(--bg);z-index:100;flex-direction:column;align-items:center;justify-content:center}
#gameWrap.open{display:flex}
#gameCanvas{border-radius:16px;background:var(--surface);max-width:100%;touch-action:none}
.game-ui{display:flex;align-items:center;gap:16px;margin-bottom:12px;font:600 16px 'Inter',sans-serif;color:var(--text)}
.game-close{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:var(--surface2);border:none;color:var(--text);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.game-close:hover{background:var(--primary)}
.game-controls{display:none;margin-top:12px;gap:8px}
.game-btn{width:56px;height:56px;border-radius:50%;background:var(--surface2);border:1px solid rgba(255,255,255,.1);color:var(--text);font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;user-select:none}
.game-btn:active{background:var(--primary)}
@media(max-width:768px){.game-controls{display:flex}}
</style>
</head>
<body>
<div class="wrap" id="mainWrap">
  <div class="code-404" id="code404" onclick="startGame()">404</div>
  <div class="code-404-hint">Нажми, чтобы поиграть</div>
  <div class="typewriter"><span class="tw-cursor" id="tw"></span></div>
  <a class="home-btn" href="/">
    <span class="material-symbols-rounded">home</span> На главную
  </a>
  <div class="path-hint" id="pathHint"></div>
</div>

<div id="gameWrap">
  <button class="game-close" onclick="closeGame()">&times;</button>
  <div class="game-ui">
    <span class="material-symbols-rounded" style="font-size:20px">emoji_events</span>
    <span id="gameScore">0</span>
  </div>
  <canvas id="gameCanvas" width="360" height="480"></canvas>
  <div class="game-controls" id="gameControls">
    <button class="game-btn" ontouchstart="gDir='left'" onmousedown="gDir='left'">←</button>
    <button class="game-btn" ontouchstart="gDir='up'" onmousedown="gDir='up'">↑</button>
    <button class="game-btn" ontouchstart="gDir='down'" onmousedown="gDir='down'">↓</button>
    <button class="game-btn" ontouchstart="gDir='right'" onmousedown="gDir='right'">→</button>
  </div>
</div>

<script>
// Typewriter
(function(){
  var phrases=['Страница не найдена...','Тут ничего нет','Может, трек удалили?','Вы заблудились','404: нот фаунд','Эта страница сбежала','Кажется, что-то пошло не так','Мелодия потерялась...','Здесь только тишина','Попробуйте вернуться на главную'];
  var el=document.getElementById('tw'),pi=0,ci=0,del=false;
  function tick(){
    var p=phrases[pi];
    if(!del){el.textContent=p.substring(0,ci+1);ci++;if(ci>=p.length){setTimeout(function(){del=true;tick()},2000);return}setTimeout(tick,60+Math.random()*40)}
    else{el.textContent=p.substring(0,ci);ci--;if(ci<0){del=false;ci=0;pi=(pi+1)%phrases.length;setTimeout(tick,400);return}setTimeout(tick,30)}
  }
  tick();
})();
document.getElementById('pathHint').textContent=location.pathname;

// Snake game easter egg
var gDir='right',gRunning=false,gIv=null;
function startGame(){
  document.getElementById('gameWrap').classList.add('open');
  var cv=document.getElementById('gameCanvas'),ctx=cv.getContext('2d');
  var W=cv.width,H=cv.height,gs=20,cols=W/gs,rows=H/gs;
  // Responsive canvas
  if(window.innerWidth<400){cv.width=300;cv.height=400;W=300;H=400;cols=W/gs;rows=H/gs}
  var snake=[{x:5,y:5}],food={x:10,y:10},score=0;
  gDir='right';gRunning=true;
  document.getElementById('gameScore').textContent='0';
  function spawn(){food={x:Math.floor(Math.random()*cols),y:Math.floor(Math.random()*rows)}}
  spawn();
  function draw(){
    ctx.fillStyle='#1e1e1e';ctx.fillRect(0,0,W,H);
    // Grid
    ctx.strokeStyle='rgba(255,255,255,.03)';ctx.lineWidth=1;
    for(var i=0;i<=cols;i++){ctx.beginPath();ctx.moveTo(i*gs,0);ctx.lineTo(i*gs,H);ctx.stroke()}
    for(var i=0;i<=rows;i++){ctx.beginPath();ctx.moveTo(0,i*gs);ctx.lineTo(W,i*gs);ctx.stroke()}
    // Food (note icon)
    ctx.fillStyle='#6750A4';ctx.font='16px sans-serif';ctx.fillText('♪',food.x*gs+3,food.y*gs+16);
    // Snake
    snake.forEach(function(s,i){
      var ratio=1-i/snake.length;
      ctx.fillStyle='rgba(103,80,164,'+(0.4+ratio*0.6)+')';
      ctx.beginPath();ctx.roundRect(s.x*gs+1,s.y*gs+1,gs-2,gs-2,4);ctx.fill();
    });
    // Score
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='12px Inter,sans-serif';ctx.fillText('Счёт: '+score,8,H-8);
  }
  if(gIv)clearInterval(gIv);
  gIv=setInterval(function(){
    if(!gRunning)return;
    var h=snake[0],nx=h.x,ny=h.y;
    if(gDir==='right')nx++;else if(gDir==='left')nx--;else if(gDir==='up')ny--;else if(gDir==='down')ny++;
    if(nx<0||nx>=cols||ny<0||ny>=rows||snake.some(function(s){return s.x===nx&&s.y===ny})){
      gRunning=false;
      ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#fff';ctx.font='bold 28px Inter,sans-serif';ctx.textAlign='center';
      ctx.fillText('Game Over',W/2,H/2-20);
      ctx.font='16px Inter,sans-serif';ctx.fillText('Счёт: '+score,W/2,H/2+16);
      ctx.font='13px Inter,sans-serif';ctx.fillStyle='rgba(255,255,255,.5)';
      ctx.fillText('Нажмите чтобы начать заново',W/2,H/2+48);
      ctx.textAlign='start';
      cv.onclick=function(){cv.onclick=null;startGame()};
      return;
    }
    snake.unshift({x:nx,y:ny});
    if(nx===food.x&&ny===food.y){score++;document.getElementById('gameScore').textContent=score;spawn()}
    else snake.pop();
    draw();
  },120);
  draw();
}
function closeGame(){
  gRunning=false;if(gIv){clearInterval(gIv);gIv=null}
  document.getElementById('gameWrap').classList.remove('open');
}
document.addEventListener('keydown',function(e){
  if(!gRunning)return;
  if(e.key==='ArrowUp'||e.key==='w'){if(gDir!=='down')gDir='up'}
  else if(e.key==='ArrowDown'||e.key==='s'){if(gDir!=='up')gDir='down'}
  else if(e.key==='ArrowLeft'||e.key==='a'){if(gDir!=='right')gDir='left'}
  else if(e.key==='ArrowRight'||e.key==='d'){if(gDir!=='left')gDir='right'}
  else if(e.key==='Escape')closeGame();
});
// Swipe controls for mobile
(function(){
  var sx,sy;
  var cv=document.getElementById('gameCanvas');
  cv.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
  cv.addEventListener('touchend',function(e){
    if(!gRunning||!sx)return;
    var dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>Math.abs(dy)){if(dx>20&&gDir!=='left')gDir='right';else if(dx<-20&&gDir!=='right')gDir='left'}
    else{if(dy>20&&gDir!=='up')gDir='down';else if(dy<-20&&gDir!=='down')gDir='up'}
  },{passive:true});
})();
</script>
</body>
</html>
