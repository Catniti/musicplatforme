<script>
/* ===== ОПТИМИЗИРОВАННЫЙ musicdb.js — потоковая загрузка вместо параллельной ===== */
(function () {
  'use strict';

  const PROD_BASE = 'https://data-sync-hub--vriskas.replit.app/api';
  const DEV_BASE  = 'https://a11cc0fd-cb9b-4609-8305-d47f99831b19-00-70ono3xcux3f.riker.replit.dev/api';
  const SERVER_TIMEOUT_MS = 6000; // Ускоренный таймаут
  const SYNC_RETRY_INTERVAL_MS = 30000;
  const CONFIG_KEY = 'mp_db_config';
  const BATCH_SIZE = 50; // Пакетная загрузка по 50 треков

  function detectServerBase() {
    try {
      const override = localStorage.getItem('mp_server_url_override');
      if (override && override.startsWith('http')) return override.replace(/\/$/, '') + (override.includes('/api') ? '' : '/api');
    } catch { }
    const host = (window.location.hostname || '').toLowerCase();
    if (host.includes('replit.app') || host.includes('data-sync-hub')) return PROD_BASE;
    if (host.includes('github.io') || host === 'localhost' || host === '') return PROD_BASE;
    return DEV_BASE;
  }

  const SERVER_BASE = detectServerBase();

  /* ===== FIX: localStorage квота ===== */
  (function patchLocalStorage() {
    const LARGE_FIELD_THRESHOLD = 5000;
    const FIELDS_TO_STRIP = ['audioData','coverData','audioBase64','coverBase64','audio','cover'];

    function stripHeavy(obj) {
      if (!obj || typeof obj !== 'object') return obj;
      const out = {};
      for (const [k, v] of Object.entries(obj)) {
        if (FIELDS_TO_STRIP.includes(k)) { out[k] = null; continue; }
        if (typeof v === 'string' && v.length > LARGE_FIELD_THRESHOLD && v.startsWith('data:')) {
          out[k] = null;
          continue;
        }
        out[k] = v;
      }
      return out;
    }

    const _orig = Storage.prototype.setItem;
    Storage.prototype.setItem = function(key, value) {
      let val = value;
      if (key === 'mp_user') {
        try {
          const parsed = JSON.parse(value);
          val = JSON.stringify(stripHeavy(parsed));
        } catch {}
      }
      try {
        _orig.call(this, key, val);
      } catch (e) {
        if (e && (e.name === 'QuotaExceededError' || e.code === 22)) {
          try { _orig.call(this, key, val); } catch (e2) {
            if (key === 'mp_user') {
              try {
                const minimal = JSON.parse(val);
                const tiny = { uid: minimal.uid, username: minimal.username, displayName: minimal.displayName, email: minimal.email, role: minimal.role, isCreator: minimal.isCreator };
                _orig.call(this, key, JSON.stringify(tiny));
              } catch {}
            }
          }
        }
      }
    };
  })();

  let serverAvailable = null;
  let serverLastChecked = 0;
  let firebaseAvailable = null;

  async function checkServerAvailable() {
    const now = Date.now();
    if (now - serverLastChecked < 5000 && serverAvailable !== null) return serverAvailable;
    try {
      const r = await fetchWithTimeout(SERVER_BASE + '/healthz', {}, 2000);
      serverAvailable = r.ok;
      serverLastChecked = Date.now();
      return serverAvailable;
    } catch {
      serverAvailable = false;
      serverLastChecked = Date.now();
      return false;
    }
  }

  async function fetchWithTimeout(url, options = {}, ms = SERVER_TIMEOUT_MS) {
    const controller = new AbortController();
    const t = setTimeout(() => controller.abort(), ms);
    try {
      const r = await fetch(url, { ...options, signal: controller.signal });
      clearTimeout(t);
      return r;
    } catch (e) {
      clearTimeout(t);
      throw e;
    }
  }

  async function serverGet(path) {
    const r = await fetchWithTimeout(SERVER_BASE + path, {
      headers: { 'Accept': 'application/json' }
    });
    if (!r.ok) throw new Error('server-' + r.status);
    return r.json();
  }

  async function serverPost(path, body) {
    const r = await fetchWithTimeout(SERVER_BASE + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error('server-' + r.status);
    return r.json();
  }

  async function serverDelete(path) {
    const r = await fetchWithTimeout(SERVER_BASE + path, { method: 'DELETE' });
    if (!r.ok) throw new Error('server-' + r.status);
    return r.json();
  }

  /* ===== ПОТОКОВАЯ ЗАГРУЗКА ВМЕСТО ПАРАЛЛЕЛЬНОЙ ===== */
  async function loadTracksFromServer() {
    try {
      const ok = await checkServerAvailable();
      if (!ok) return null;
      const res = await serverGet('/tracks');
      if (!res.ok) return null;
      return res.data;
    } catch { return null; }
  }

  async function loadTracksWithFallback() {
    // ИЗМЕНЕНИЕ: Попробуем сервер ПЕРВЫЙ и быстро перейдём на Firebase
    const serverTracksPromise = loadTracksFromServer();
    
    // Даём серверу 3.5 сек (вместо 6), затем пробуем Firebase
    const serverRaceTimeout = new Promise(resolve => setTimeout(() => resolve(null), 3500));
    const serverResult = await Promise.race([serverTracksPromise, serverRaceTimeout]);

    if (serverResult) {
      return { data: serverResult, source: 'server' };
    }

    // Сервер не ответил, пробуем Firebase с потоковой загрузкой
    if (window.firebase && window.firebase.database) {
      const db = window.firebase.database();
      return new Promise(resolve => {
        const timeout = setTimeout(() => {
          firebaseAvailable = false;
          resolve({ data: {}, source: 'firebase-timeout' });
        }, 5000);

        db.ref('tracks').once('value', snap => {
          clearTimeout(timeout);
          firebaseAvailable = true;
          resolve({ data: snap.val() || {}, source: 'firebase' });
        }).catch(() => {
          clearTimeout(timeout);
          firebaseAvailable = false;
          resolve({ data: {}, source: 'firebase-error' });
        });
      });
    }

    return { data: {}, source: 'none' };
  }

  async function saveTrackToServer(trackId, trackData) {
    try {
      const ok = await checkServerAvailable();
      if (!ok) {
        return { saved: false, queued: true };
      }
      await serverPost('/tracks', { ...trackData, id: trackId });
      return { saved: true, queued: false };
    } catch (e) {
      return { saved: false, queued: true };
    }
  }

  async function saveTrackEverywhere(trackId, trackData) {
    let serverResult = await saveTrackToServer(trackId, trackData);

    if (firebaseAvailable !== false && window.firebase && window.firebase.database) {
      try {
        const db = window.firebase.database();
        await db.ref('tracks/' + trackId).set(trackData);
        firebaseAvailable = true;
      } catch (e) {
        firebaseAvailable = false;
      }
    }

    return { server: serverResult };
  }

  async function getFirebaseCollectionStreamwise(col, timeoutMs, onBatch) {
    const ms = timeoutMs || 5000;
    try {
      if (!window.firebase) return {};
      const fdb = window.firebase.database();
      return await new Promise((resolve) => {
        const timer = setTimeout(() => {
          console.warn('[MusicDB] Firebase timeout for:', col);
          resolve({});
        }, ms);

        fdb.ref(col).once('value', snap => {
          clearTimeout(timer);
          const data = snap.val() || {};
          const clean = {};
          const ids = Object.keys(data);
          
          // Загружаем ПОТОКОМ, не сразу
          for (let i = 0; i < ids.length; i += BATCH_SIZE) {
            const batch = ids.slice(i, i + BATCH_SIZE);
            batch.forEach(id => {
              if (data[id] != null) clean[id] = data[id];
            });
            if (onBatch) onBatch(clean);
          }
          
          resolve(clean);
        }, () => { clearTimeout(timer); resolve({}); });
      });
    } catch { return {}; }
  }

  async function getServicesStatus() {
    const result = {
      server: { status: 'checking', latencyMs: null },
      firebase: { status: 'checking', latencyMs: null },
    };

    const serverStart = Date.now();
    try {
      const r = await fetchWithTimeout(SERVER_BASE + '/admin/status', {}, 3000);
      if (r.ok) {
        result.server.latencyMs = Date.now() - serverStart;
        result.server.status = 'ok';
        serverAvailable = true;
      } else {
        result.server.status = 'error';
        serverAvailable = false;
      }
    } catch (e) {
      result.server.status = 'offline';
      result.server.latencyMs = Date.now() - serverStart;
      serverAvailable = false;
    }

    if (window.firebase && window.firebase.database) {
      const fbStart = Date.now();
      try {
        const db = window.firebase.database();
        await new Promise((resolve, reject) => {
          const t = setTimeout(() => reject(new Error('timeout')), 3000);
          db.ref('.info/connected').once('value', snap => {
            clearTimeout(t);
            resolve(snap.val());
          }).catch(e => { clearTimeout(t); reject(e); });
        });
        result.firebase.latencyMs = Date.now() - fbStart;
        result.firebase.status = 'ok';
        firebaseAvailable = true;
      } catch (e) {
        result.firebase.latencyMs = Date.now() - fbStart;
        result.firebase.status = e.message === 'timeout' ? 'timeout' : 'error';
        firebaseAvailable = false;
      }
    } else {
      result.firebase.status = 'not-loaded';
    }

    return result;
  }

  /* ===== ПУБЛИЧНОЕ API ===== */
  const MusicDB = {
    SERVER_BASE,
    serverAvailable: () => serverAvailable,
    firebaseAvailable: () => firebaseAvailable,
    checkServerAvailable,
    saveTrack: saveTrackEverywhere,
    saveTrackToServer,
    loadTracks: loadTracksWithFallback,
    getServicesStatus,
    getFirebaseCollectionStreamwise,

    showDiff: async function() {
      if (!window.firebase) {
        if (typeof window.showSnackbar === 'function') window.showSnackbar('Firebase не загружена');
        return;
      }
      if (typeof window.showSnackbar === 'function') window.showSnackbar('🔄 Загружаем данные потоком...');
      
      // Потоковая загрузка вместо Promise.all
      const tracks = await getFirebaseCollectionStreamwise('tracks', 8000, (batch) => {
        console.log('[MusicDB] Loaded batch of', Object.keys(batch).length, 'tracks');
      });
      
      if (typeof window.showSnackbar === 'function') window.showSnackbar('✅ Данные загружены: ' + Object.keys(tracks).length + ' треков');
    },
  };

  window.MusicDB = MusicDB;
})();
</script>
